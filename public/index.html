<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expiration Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pikaday/css/pikaday.css">
    <script src="https://cdn.jsdelivr.net/npm/pikaday/pikaday.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
</head>
<body>
 
    <h1>Expiration Tracker</h1>
 
    <div class="form-container">
        <input type="text" id="barcode-input" placeholder="Enter UPC barcode" />
        <button onclick="lookupBarcode()">Look Up Item</button>
        <button onclick="toggleScanner()">Scan Barcode</button>
 
        <div id="scanner-container" style="display:none; position:relative; margin-bottom:10px;">
            <video id="scanner-video" style="width:100%; border-radius:6px;" playsinline></video>
            <div id="scan-guide"></div>
            <canvas id="scanner-capture" style="display:none;"></canvas>
            <div id="scanner-controls">
                <div id="focus-control" style="display:none;">
                    <label>Focus</label>
                    <input type="range" id="focus-slider" min="0" max="1" step="0.01" value="0.5" />
                </div>
                <button id="torch-btn" style="display:none;" onclick="handleTorchClick()">Torch: Off</button>
            </div>
        </div>

        <div id="product-info">
            <p id="product-not-found-msg">Product not found — enter details manually:</p>
            <label class="field-label">Name</label>
            <input type="text" id="product-name" placeholder="Product name" />
            <label class="field-label">Brand</label>
            <input type="text" id="product-brand" placeholder="Brand" />
        </div>
 
        <input type="text" id="expiration-date" placeholder="Select expiration date" readonly />
        <div id="calendar-container"></div>
        <button onclick="saveItem()">Add Item</button>
    </div>
 
    <div style="max-width:600px; margin: 0 auto 10px auto; text-align:right;">
        <button onclick="loadItems()" style="width:auto; padding: 8px 16px;">↻ Refresh</button>
    </div>
 
    <div class="items-container" id="items-list"></div>
 
    <!-- Custom modal (replaces alert/confirm) -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <p id="modal-message"></p>
            <div class="modal-buttons">
                <button id="modal-cancel" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="modal-confirm" class="modal-btn modal-btn-confirm">OK</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
